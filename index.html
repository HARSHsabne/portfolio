<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARSH | CREATIVE TECH</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');

        :root { --accent: #00ffaa; }
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; margin: 0; width: 100%; }
        
        #webgl-bg { position: fixed; top: 0; left: 0; z-index: -1; outline: none; }

        .hero-text { 
            font-family: 'Syncopate', sans-serif; 
            font-size: clamp(2.5rem, 10vw, 12rem); 
            line-height: 0.9; 
            letter-spacing: -0.05em; 
            width: 100%;
        }
        
        /* CLEAN NOISE EFFECT - NO EXTERNAL LINKS */
        .noise { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; opacity: .04; z-index: 100; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .project-row { border-top: 1px solid rgba(255,255,255,0.1); transition: all 0.4s ease; width: 100%; }
        
        @media (min-width: 768px) {
            .project-row:hover { background: #fff; color: #000; padding-left: 2rem; }
            .cursor { width: 20px; height: 20px; border: 1px solid var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 999; transition: transform 0.1s; }
        }
        
        @media (max-width: 767px) { .cursor { display: none; } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="hide-scrollbar">

    <div class="noise"></div>
    <div class="cursor" id="cursor"></div>
    <canvas id="webgl-bg"></canvas>

    <nav class="fixed top-0 w-full p-6 md:p-8 flex justify-between items-start z-50 mix-blend-difference">
        <div class="font-bold tracking-tighter text-xl md:text-2xl uppercase leading-none">Harsh <br> Sabne</div>
        <div class="text-[8px] md:text-[10px] tracking-[0.3em] md:tracking-[0.5em] uppercase font-bold text-right">
            Based in India <br> Full Stack & 3D
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center px-6 md:px-12 relative z-10 overflow-hidden">
        
        <div class="absolute inset-0 z-0 opacity-40 mix-blend-luminosity pointer-events-none">
            <img src="harshit.png" alt="Harsh Sabne" class="w-full h-full object-cover object-center grayscale brightness-75">
        </div>

        <div class="relative z-10 mix-blend-difference">
            <div class="hero-text font-bold reveal-text">CREATIVE</div>
            <div class="hero-text font-bold text-transparent" style="-webkit-text-stroke: 1px #fff; padding-left: 5vw;">DEVELOPER</div>
        </div>
        
        <div class="mt-12 md:absolute md:bottom-12 md:right-12 max-w-xs text-xs md:text-sm text-gray-400 leading-relaxed reveal-up mix-blend-difference">
            "I build digital ecosystems where logic meets high-end aesthetics."
        </div>
    </section>

    <section id="work" class="py-24 md:py-40 px-6 md:px-12 relative z-20 bg-black/50 backdrop-blur-sm">
        <div class="text-[10px] uppercase tracking-[0.5em] md:tracking-[1em] mb-12 md:mb-20 text-gray-500">Selected Case Studies</div>
        
        <div class="project-row flex flex-col md:flex-row justify-between items-start md:items-center py-8 md:py-12 group cursor-pointer">
            <h3 class="text-3xl md:text-7xl font-bold uppercase tracking-tighter">Zipto Logistics</h3>
            <span class="text-[10px] md:text-xs uppercase font-bold opacity-60 md:opacity-0 md:group-hover:opacity-100 transition-opacity mt-2 md:mt-0">Full Stack Engine</span>
        </div>

        <div class="project-row flex flex-col md:flex-row justify-between items-start md:items-center py-8 md:py-12 group cursor-pointer">
            <h3 class="text-3xl md:text-7xl font-bold uppercase tracking-tighter">Udgir Auto 3D</h3>
            <span class="text-[10px] md:text-xs uppercase font-bold opacity-60 md:opacity-0 md:group-hover:opacity-100 transition-opacity mt-2 md:mt-0">Three.js Simulator</span>
        </div>

        <div class="project-row flex flex-col md:flex-row justify-between items-start md:items-center py-8 md:py-12 group cursor-pointer border-b border-white/10">
            <h3 class="text-3xl md:text-7xl font-bold uppercase tracking-tighter">YouDeserve Clinic</h3>
            <span class="text-[10px] md:text-xs uppercase font-bold opacity-60 md:opacity-0 md:group-hover:opacity-100 transition-opacity mt-2 md:mt-0">Premium UI/UX</span>
        </div>
    </section>

    <section class="min-h-screen flex items-center justify-center text-center px-6 relative z-20">
        <div>
            <h2 class="text-4xl md:text-9xl font-bold tracking-tighter mb-8 md:mb-10 reveal-text uppercase italic">WANT TO <br> INNOVATE?</h2>
            <a href="mailto:contact@harshsabne.com" class="text-lg md:text-2xl font-bold border-b-2 md:border-b-4 border-accent pb-1 md:pb-2 hover:bg-accent hover:text-black transition-all px-2 md:px-4">GET IN TOUCH</a>
        </div>
    </section>

    <a href="https://wa.me/91XXXXXXXXXX" class="fixed bottom-6 right-6 z-[100] bg-[#25D366] p-4 rounded-full shadow-[0_10px_30px_rgba(37,211,102,0.4)] hover:scale-110 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
    </a>

    <script>
        // THREE.JS PARTICLES
        const canvas = document.querySelector('#webgl-bg');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        const particlesGeometry = new THREE.BufferGeometry();
        const count = window.innerWidth < 768 ? 1200 : 3000;
        const positions = new Float32Array(count * 3);
        for(let i = 0; i < count * 3; i++) { positions[i] = (Math.random() - 0.5) * 15; }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const particlesMaterial = new THREE.PointsMaterial({ size: 0.015, color: '#00ffaa', transparent: true, opacity: 0.5 });
        const points = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(points);
        camera.position.z = 3;

        let mouseX = 0, mouseY = 0;
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) - 0.5;
                mouseY = (e.clientY / window.innerHeight) - 0.5;
                gsap.to('#cursor', { x: e.clientX, y: e.clientY, duration: 0.3 });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.001;
            points.rotation.x += mouseY * 0.08;
            points.rotation.y += mouseX * 0.08;
            renderer.render(scene, camera);
        }
        animate();

        // GSAP
        gsap.registerPlugin(ScrollTrigger);
        gsap.from(".reveal-text", { duration: 1.2, y: 60, opacity: 0, stagger: 0.2, ease: "power3.out" });
        
        gsap.to(particlesMaterial.color, {
            scrollTrigger: { trigger: "#work", start: "top center", end: "bottom center", scrub: true },
            r: 1, g: 1, b: 1
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
